<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Native JavaScript Shortcut Demo</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        border: 1px solid #e2e8f0;
      }
      kbd {
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        padding: 2px 6px;
        font-family: monospace;
        font-size: 0.9em;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
      }
      .log {
        margin-top: 20px;
        background: #1e293b;
        color: #38bdf8;
        padding: 12px;
        border-radius: 6px;
        font-family: monospace;
        max-height: 150px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Native JavaScript Demo</h1>
      <p>This demo uses the compiled global build to manage shortcuts natively.</p>
      <p>Try pressing the following shortcuts:</p>
      <ul>
        <li><kbd>Ctrl+S</kbd> - Trigger a simulated save action</li>
        <li><kbd>Alt+N</kbd> - Create a new file log entry</li>
      </ul>

      <div class="log" id="log-output">Logs will appear here...</div>
    </div>

    <!-- Include compiled global bundle -->
    <script src="../../dist/keyboard-shortcuts.global.js"></script>
    <script>
      const logEl = document.getElementById('log-output');
      function log(message) {
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML += `<br>[${time}] ${message}`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      // Initialize KeyboardShortcutManager
      const manager = new KeyboardShortcutManager();

      // Register shortcuts
      manager.register(
        'Ctrl+S',
        () => {
          log('Ctrl+S pressed: Simulating document save!');
        },
        { description: 'Simulated Save' },
      );

      manager.register(
        'Alt+N',
        () => {
          log('Alt+N pressed: Simulating new document creation!');
        },
        { description: 'Simulated New Document' },
      );
    </script>
  </body>
</html>
